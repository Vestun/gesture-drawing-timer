<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balanced Drawing Timer</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  margin: 0;
  text-align: center;
}

h2 { margin: 10px; }

#dropzone {
  border: 3px dashed #555;
  margin: 10px;
  padding: 20px;
  border-radius: 10px;
}

img {
  width: 100%;
  height: 80vh;
  object-fit: contain;
  display: block;
  margin: auto;
}

.controls {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 6px;
  margin: 10px;
}

button, input {
  font-size: 16px;
  padding: 8px;
}

#timer {
  font-size: 30px;
  margin: 10px;
}
</style>
</head>

<body>

<h2>🎨 Balanced Drawing Timer</h2>

<div id="dropzone">
  Drop images, folders, or ZIPs<br><br>

  <input type="file" id="fileInput" multiple>
  <input type="file" id="folderInput" webkitdirectory multiple>
</div>

<div class="controls">
  ⏱ <input type="number" id="timeInput" value="120">

  <button onclick="start()">Start</button>
  <button onclick="next()">Next</button>
  <button onclick="prev()">Prev</button>
  <button onclick="toggleFullscreen()">Fullscreen</button>
</div>

<div id="timer">00:00</div>
<div id="viewer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
let sources = [];
let sessionOrder = [];
let index = 0;
let timeLeft = 120;
let interval = null;
let paused = false;

const viewer = document.getElementById("viewer");

/* ---------------- FULLSCREEN ---------------- */

function toggleFullscreen() {
  const el = document.documentElement;

  if (!document.fullscreenElement) {
    el.requestFullscreen().catch(err => {
      console.log("Fullscreen failed:", err);
    });
  } else {
    document.exitFullscreen();
  }
}

/* ---------------- INPUT ---------------- */

document.getElementById("fileInput").addEventListener("change", e => addFiles(e.target.files));
document.getElementById("folderInput").addEventListener("change", e => addFiles(e.target.files));

document.getElementById("dropzone").addEventListener("dragover", e => e.preventDefault());

document.getElementById("dropzone").addEventListener("drop", e => {
  e.preventDefault();
  addFiles(e.dataTransfer.files);
});

/* ---------------- GROUP ---------------- */

function getGroup(file) {
  if (file.webkitRelativePath) {
    return file.webkitRelativePath.split("/")[0];
  }
  if (typeof file === "string") {
    return file.split("/")[0] || "zip";
  }
  return "root";
}

/* ---------------- FILES ---------------- */

async function addFiles(files) {
  for (let file of files) {
    if (file.name.endsWith(".zip")) {
      await loadZip(file);
    } else if (file.type.startsWith("image/")) {
      sources.push({
        type: "file",
        data: file,
        group: getGroup(file)
      });
    }
  }
}

/* ---------------- ZIP ---------------- */

async function loadZip(file) {
  const zip = await JSZip.loadAsync(file);

  for (let name in zip.files) {
    const entry = zip.files[name];

    if (!entry.dir && /\.(jpg|jpeg|png|webp)$/i.test(name)) {
      const blob = await entry.async("blob");

      sources.push({
        type: "blob",
        data: blob,
        group: getGroup(name)
      });
    }
  }
}

/* ---------------- SHUFFLE ---------------- */

function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ---------------- BALANCED ---------------- */

function balancedShuffle(items) {
  const groups = {};

  for (let item of items) {
    if (!groups[item.group]) groups[item.group] = [];
    groups[item.group].push(item);
  }

  for (let g in groups) {
    groups[g] = shuffle(groups[g]);
  }

  const result = [];
  let added = true;

  while (added) {
    added = false;

    for (let g in groups) {
      if (groups[g].length > 0) {
        result.push(groups[g].pop());
        added = true;
      }
    }
  }

  return shuffle(result);
}

/* ---------------- START ---------------- */

function start() {
  if (!sources.length) return alert("Add images first");

  sessionOrder = balancedShuffle(sources);

  index = 0;
  timeLeft = parseInt(document.getElementById("timeInput").value);
  paused = false;

  show(index);
  updateTimer();

  clearInterval(interval);
  interval = setInterval(tick, 1000);

  // optional: auto fullscreen on start
  toggleFullscreen();
}

/* ---------------- DISPLAY ---------------- */

function show(i) {
  viewer.innerHTML = "";

  let src = sessionOrder[i];
  if (!src) return;

  let url = URL.createObjectURL(src.data);

  let img = document.createElement("img");
  img.src = url;

  viewer.appendChild(img);
}

/* ---------------- TIMER ---------------- */

function tick() {
  if (paused) return;

  timeLeft--;
  updateTimer();

  if (timeLeft <= 0) {
    next();
    timeLeft = parseInt(document.getElementById("timeInput").value);
  }
}

function updateTimer() {
  let m = Math.floor(timeLeft / 60);
  let s = timeLeft % 60;

  document.getElementById("timer").textContent =
    String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
}

/* ---------------- NAV ---------------- */

function next() {
  if (!sessionOrder.length) return;
  index = (index + 1) % sessionOrder.length;
  show(index);
}

function prev() {
  if (!sessionOrder.length) return;
  index = (index - 1 + sessionOrder.length) % sessionOrder.length;
  show(index);
}
</script>

</body>
</html>
